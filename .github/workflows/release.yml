name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build + Test + GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build report player (bundled into wheel)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          test -f ../templates/report-player/index.html
          test -d ../templates/report-player/assets
          ls -la ../templates/report-player/assets/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: CLI smoke
        run: uv run lk-sim --help

      - name: Build wheel (CI artifact for installers)
        run: |
          rm -rf dist
          uv build --wheel
          ls -la dist/
          uv run python - <<'PY'
          import sys, zipfile
          from pathlib import Path

          wheels = list(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          whl = wheels[0]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          player = [n for n in names if "report-player/index.html" in n]
          assert player, "wheel missing report-player/index.html"
          print(f"wheel={whl.name} entries={len(names)} player={player[0]}")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            install.sh
            install.ps1
            dist/*.whl
          body: |
            ## Install

            CI builds a **prebuilt wheel** (report player included). Installers download that
            artifact from this release — you do **not** build from source on the user machine.
            Still **no PyPI**; distribution is GitHub Releases only.

            ### macOS / Linux

            ```bash
            # pin to this release (downloads CI wheel)
            curl -fsSL "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.sh?$(date +%s)" | bash -s -- --ref ${{ github.ref_name }} --verify

            # default = latest release wheel when available
            curl -fsSL "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.sh?$(date +%s)" | bash
            ```

            ### Windows PowerShell

            ```powershell
            # default = latest release wheel
            irm "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.ps1" | iex

            # pin tag
            irm "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.ps1" -OutFile install.ps1
            .\install.ps1 -GitRef ${{ github.ref_name }} -Verify
            ```

            ### Direct (prebuilt wheel)

            Download the `.whl` from **Assets** below (pure `py3-none-any`), then:

            ```bash
            uv tool install --force ./livekit_agent_simulator-*.whl
            ```

            Report player is inside the wheel — no Node on the user machine.

      - name: Release summary
        if: always()
        run: |
          {
            echo "## Release"
            echo ""
            echo "Tag: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "### Pipeline"
            echo "- pnpm web build → templates/report-player/"
            echo "- pytest + lk-sim --help"
            echo "- **uv build --wheel** (assert report-player inside)"
            echo "- GitHub Release: install.sh + install.ps1 + dist/*.whl"
            echo "- **No** PyPI publish"
            echo ""
            echo "### Install"
            echo "\`\`\`bash"
            echo "curl -fsSL \"https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.sh?\$(date +%s)\" | bash -s -- --ref ${GITHUB_REF_NAME} --verify"
            echo "\`\`\`"
            echo ""
            echo "\`\`\`powershell"
            echo "irm \"https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.ps1\" | iex"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
